[defaults]
# Inventario por defecto
inventory           = inventory/hosts.ini

# No verificar host keys SSH (entorno de laboratorio)
host_key_checking   = False

# Timeout de conexión en segundos
timeout             = 30

# Mostrar diferencias cuando hay cambios
diff_always         = True

# Número de hosts configurados en paralelo
forks               = 5

# Deshabilitar recolección de facts (más rápido en dispositivos de red)
gathering           = explicit

# Ruta de roles
roles_path          = roles/

# Log de ejecución
log_path            = /tmp/ansible.log

[persistent_connection]
# Tiempo que se mantiene la conexión SSH abierta
connect_timeout     = 30
command_timeout     = 30

[ssh_connection]
# Acelerar conexiones SSH reutilizando sockets
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s
pipelining          = True
