# =============================================================
# Inventory — Topología VPN full-mesh IPSec/GRE/OSPF
# =============================================================
# Todos los routers son accesibles desde el contenedor Ansible
# a través de la red de gestión 10.0.0.0/24

[routers]
R1 ansible_host=10.0.0.1
R2 ansible_host=10.0.0.2
R3 ansible_host=10.0.0.3

# -------------------------------------------------------------
# Variables comunes a todos los routers Cisco IOSv
# -------------------------------------------------------------
[routers:vars]
ansible_network_os=cisco.ios.ios
ansible_connection=ansible.netcommon.network_cli
ansible_user=admin
ansible_password=admin123
ansible_become=yes
ansible_become_method=enable
ansible_become_password=enable123
