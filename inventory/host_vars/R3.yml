---
# =============================================================
# host_vars/R3.yml — Variables específicas de R3
# =============================================================

hostname: "R3"

interfaces:
  wan:
    name: "GigabitEthernet0/0"
    ip: "10.0.0.3"
    mask: "255.255.255.0"
    description: "WAN - Red de gestion y transporte"
  lan:
    name: "GigabitEthernet0/1"
    ip: "192.168.3.1"
    mask: "255.255.255.0"
    description: "LAN local R3"

ospf_router_id: "3.3.3.3"

ospf_networks:
  - network: "192.168.3.0"
    wildcard: "0.0.0.255"
    area: 0
  - network: "172.16.13.0"
    wildcard: "0.0.0.3"
    area: 0
  - network: "172.16.23.0"
    wildcard: "0.0.0.3"
    area: 0

gre_tunnels:
  - name: "Tunnel31"
    number: 31
    local_ip: "172.16.13.2"
    mask: "255.255.255.252"
    source_interface: "GigabitEthernet0/0"
    destination: "10.0.0.1"       # IP WAN de R1
    description: "GRE Tunnel R3 to R1"

  - name: "Tunnel32"
    number: 32
    local_ip: "172.16.23.2"
    mask: "255.255.255.252"
    source_interface: "GigabitEthernet0/0"
    destination: "10.0.0.2"       # IP WAN de R2
    description: "GRE Tunnel R3 to R2"

ipsec_peers:
  - peer_ip: "10.0.0.1"           # R1
    tunnel_interface: "Tunnel31"
  - peer_ip: "10.0.0.2"           # R2
    tunnel_interface: "Tunnel32"
