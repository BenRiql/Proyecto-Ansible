---
# =============================================================
# host_vars/R2.yml — Variables específicas de R2
# =============================================================

hostname: "R2"

interfaces:
  wan:
    name: "GigabitEthernet0/0"
    ip: "10.0.0.2"
    mask: "255.255.255.0"
    description: "WAN - Red de gestion y transporte"
  lan:
    name: "GigabitEthernet0/1"
    ip: "192.168.2.1"
    mask: "255.255.255.0"
    description: "LAN local R2"

ospf_router_id: "2.2.2.2"

ospf_networks:
  - network: "192.168.2.0"
    wildcard: "0.0.0.255"
    area: 0
  - network: "172.16.12.0"
    wildcard: "0.0.0.3"
    area: 0
  - network: "172.16.23.0"
    wildcard: "0.0.0.3"
    area: 0

gre_tunnels:
  - name: "Tunnel21"
    number: 21
    local_ip: "172.16.12.2"
    mask: "255.255.255.252"
    source_interface: "GigabitEthernet0/1"
    destination: "192.168.12.1"
    description: "GRE R2 a R1"

  - name: "Tunnel23"
    number: 23
    local_ip: "172.16.23.1"
    mask: "255.255.255.252"
    source_interface: "GigabitEthernet0/2"
    destination: "192.168.23.2"
    description: "GRE R2 a R3"

ipsec_peers:
  - peer_ip: "192.168.12.1"
    tunnel_interface: "Tunnel21"
  - peer_ip: "192.168.23.2"
    tunnel_interface: "Tunnel23"
