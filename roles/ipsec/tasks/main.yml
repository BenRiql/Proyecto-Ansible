---
# =============================================================
# roles/ipsec/tasks/main.yml
# Configura IPSec sobre los túneles GRE (cifrado)
# Phase 1: IKE policy / Phase 2: Transform-set + Crypto map
# =============================================================

# ---- PHASE 1: IKE ----
- name: "[IPSEC] Configurar IKE Policy (Phase 1)"
  cisco.ios.ios_config:
    lines:
      - "encryption {{ ike_encryption }}"
      - "hash {{ ike_hash }}"
      - "authentication {{ ike_auth }}"
      - "group {{ ike_dh_group }}"
      - "lifetime {{ ike_lifetime }}"
    parents: "crypto isakmp policy {{ ike_policy_number }}"
  notify: save config

# ---- KEYRING: pre-shared keys por peer ----
- name: "[IPSEC] Configurar pre-shared keys por peer"
  cisco.ios.ios_config:
    lines:
      - "pre-shared-key address {{ item.peer_ip }} key {{ ipsec_preshared_key }}"
    parents: "crypto keyring {{ ipsec_keyring_name }}"
  loop: "{{ ipsec_peers }}"
  loop_control:
    label: "PSK → {{ item.peer_ip }}"
  notify: save config

# ---- ISAKMP PROFILE: asociar keyring a los peers ----
- name: "[IPSEC] Configurar ISAKMP profile"
  cisco.ios.ios_config:
    lines:
      - "keyring {{ ipsec_keyring_name }}"
      - "match identity address {{ item.peer_ip }} 255.255.255.255"
    parents: "crypto isakmp profile {{ ipsec_profile_name }}_{{ item.peer_ip | replace('.', '_') }}"
  loop: "{{ ipsec_peers }}"
  loop_control:
    label: "ISAKMP profile → {{ item.peer_ip }}"
  notify: save config

# ---- PHASE 2: TRANSFORM SET ----
- name: "[IPSEC] Configurar Transform Set (Phase 2)"
  cisco.ios.ios_config:
    lines:
      - "crypto ipsec transform-set {{ ipsec_transform_set }} {{ ipsec_encryption }} {{ ipsec_auth }}"
      - "mode transport"
  notify: save config

# ---- IPSEC PROFILE: asociar transform-set a los túneles ----
- name: "[IPSEC] Configurar IPSec Profile"
  cisco.ios.ios_config:
    lines:
      - "set transform-set {{ ipsec_transform_set }}"
      - "set isakmp-profile {{ ipsec_profile_name }}_{{ item.peer_ip | replace('.', '_') }}"
    parents: "crypto ipsec profile {{ ipsec_profile_name }}_{{ item.peer_ip | replace('.', '_') }}"
  loop: "{{ ipsec_peers }}"
  loop_control:
    label: "IPSec profile → {{ item.peer_ip }}"
  notify: save config

# ---- APLICAR IPSEC PROFILE A CADA TÚNEL GRE ----
- name: "[IPSEC] Aplicar IPSec profile a interfaces de túnel"
  cisco.ios.ios_config:
    lines:
      - "tunnel protection ipsec profile {{ ipsec_profile_name }}_{{ item.peer_ip | replace('.', '_') }}"
    parents: "interface {{ item.tunnel_interface }}"
  loop: "{{ ipsec_peers }}"
  loop_control:
    label: "{{ item.tunnel_interface }} → {{ item.peer_ip }}"
  notify: save config

# ---- VERIFICACIÓN ----
- name: "[IPSEC] Verificar SAs establecidas"
  cisco.ios.ios_command:
    commands:
      - "show crypto isakmp sa"
      - "show crypto ipsec sa summary"
  register: ipsec_sa_status

- name: "[IPSEC] Mostrar estado de SAs"
  debug:
    msg: "{{ ipsec_sa_status.stdout_lines }}"
