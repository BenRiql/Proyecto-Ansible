---
- name: "[OSPF] Configurar proceso OSPF y router-id"
  cisco.ios.ios_config:
    lines:
      - "router-id {{ ospf_router_id }}"
    parents: "router ospf {{ ospf_process_id }}"
  notify: save config

- name: "[OSPF] Anunciar redes por OSPF"
  cisco.ios.ios_config:
    lines:
      - "network {{ item.network }} {{ item.wildcard }} area {{ item.area }}"
    parents: "router ospf {{ ospf_process_id }}"
  loop: "{{ ospf_networks }}"
  loop_control:
    label: "{{ item.network }}/{{ item.wildcard }}"
  notify: save config

- name: "[OSPF] Ajustar parámetros en túneles GRE"
  cisco.ios.ios_config:
    lines:
      - "ip ospf hello-interval 10"
      - "ip ospf dead-interval 40"
      - "ip ospf network point-to-point"
    parents: "interface {{ item.name }}"
  loop: "{{ gre_tunnels }}"
  loop_control:
    label: "{{ item.name }}"
  notify: save config

- name: "[OSPF] Verificar vecinos OSPF"
  cisco.ios.ios_command:
    commands:
      - "show ip ospf neighbor"
      - "show ip route ospf"
  register: ospf_status

- name: "[OSPF] Mostrar vecinos y rutas OSPF"
  ansible.builtin.debug:
    msg: "{{ ospf_status.stdout_lines }}"
