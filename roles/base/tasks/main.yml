---
- name: "[BASE] Configurar hostname"
  cisco.ios.ios_hostname:
    config:
      hostname: "{{ hostname }}"
    state: merged

- name: "[BASE] Deshabilitar búsqueda DNS"
  cisco.ios.ios_config:
    lines:
      - no ip domain-lookup
  notify: save config

- name: "[BASE] Configurar dominio y credenciales para SSH"
  cisco.ios.ios_config:
    lines:
      - "ip domain-name {{ dns_domain }}"
      - "username admin privilege 15 secret admin123"
      - "enable secret enable123"
  notify: save config

- name: "[BASE] Generar clave RSA para SSH"
  cisco.ios.ios_config:
    lines:
      - crypto key generate rsa modulus 2048
  register: rsa_result
  failed_when: false
  changed_when: "'The name for the keys will be' in rsa_result.stdout | default('')"

- name: "[BASE] Habilitar SSH versión 2"
  cisco.ios.ios_config:
    lines:
      - ip ssh version 2
      - ip ssh time-out 60
      - ip ssh authentication-retries 3
  notify: save config

- name: "[BASE] Configurar líneas VTY para acceso SSH"
  cisco.ios.ios_config:
    lines:
      - transport input ssh
      - login local
      - exec-timeout 30 0
    parents: line vty 0 4
  notify: save config

- name: "[BASE] Verificar conectividad al gateway de gestión"
  cisco.ios.ios_ping:
    dest: "10.0.0.100"
    count: 3
  register: ping_result
  failed_when: ping_result.packet_loss == '100%'
